<div class="login-container">
  
  <div class="logo">
    <img src="img/ford.png" alt="Ford">
  </div>

  <div class="content">
    <div class="vehicle-section">
      <img src="img/ranger.png" alt="Ranger" class="vehicle-img">
    </div>

    <div class="form-section">
      <div class="login-box">
  <h2>Boas-vindas</h2>

  <div class="field-wrapper mb-3">
    <div class="input-group-custom">
      <i class="bi bi-person-fill icon-left"></i>
      <input type="email" class="form-control-custom" placeholder="Insira seu e-mail">
    </div>
    <i class="bi bi-info-circle-fill icon-outside-green"></i>
  </div>

  <div class="field-wrapper mb-2">
    <div class="input-group-custom">
      <i class="bi bi-lock-fill icon-left"></i>
      <input type="password" class="form-control-custom" placeholder="Insira sua senha">
      <i class="bi bi-eye-slash icon-right-gray"></i> </div>
    <div class="spacer-outside"></div> 
  </div>

  <div class="field-wrapper mb-4">
    <div class="switch-left">
      <span class="switch-label">Logar automaticamente</span>
      <label class="switch">
        <input type="checkbox" id="autologin">
        <span class="slider round"></span>
      </label>
    </div>
    <i class="bi bi-info-circle-fill icon-outside-green"></i>
  </div>

  <div class="field-wrapper">
    <button class="btn-custom">Entrar</button>
    <div class="spacer-outside"></div>
  </div>
</div>
