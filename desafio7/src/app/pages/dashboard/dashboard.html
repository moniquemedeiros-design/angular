<div class="dashboard">

    <h2>Dashboard Ford</h2>
    <div class="card-veiculo">
        <label>Veículo</label>

        <select (change)="trocarVeiculo($event)">
            <option value="ranger">Ranger</option>
            <option value="mustang">Mustang</option>
            <option value="territory">Territory</option>
            <option value="bronco">Bronco Sport</option>
        </select>
    </div>

    <div class="card-info">
        <h4>Total de Vendas</h4>
        <p>{{ totalvendas }}</p>
    </div>

    <div class="card-info">
        <h4>Conectados</h4>
        <p>{{ conectados }}</p>
    </div>

    <div class="card-info">
        <h4>Update Software</h4>
        <p>{{ atualizados }}</p>
    </div>

</div>


<div class="imagem-carro">
    <img [src]="imagemVeiculo">
</div>

<div class="tabela">
    <input type="text" placeholder="Código VIN" [(ngModel)]="vin">

    <button>Buscar</button>

    <table>
        <thead>
            <tr>
                <th>Odômetro</th>
                <th>Combustível</th>
                <th>Status</th>
                <th>Latitude</th>
                <th>Longitude</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>{{ odometro }}</td>
                <td>{{ combustivel }}</td>
                <td>{{ status }}</td>
                <td>{{ latitude }}</td>
                <td>{{ longitude }}</td>
            </tr>
        </tbody>

    </table>

</div>

</div>
